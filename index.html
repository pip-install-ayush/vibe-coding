<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify Premium Landscape Player</title>

    <link rel="icon" type="image/png" href="favicon.png" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", system-ui, sans-serif;
            background: #0f0c1b;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .bg-blur-layer {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background-size: cover;
            background-position: center;
            filter: blur(80px) saturate(1.5) brightness(0.4);
            z-index: 1;
            transition: background-image 1.5s ease;
        }

        .bg-blur-layer::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(15, 12, 27, 0.2) 0%, rgba(15, 12, 27, 0.8) 100%);
        }

        .glass-panel {
            background: linear-gradient(135deg,
                    rgba(255, 255, 255, 0.05),
                    rgba(255, 255, 255, 0.01));
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px;
            width: 800px;
            max-width: 95%;
            height: 480px;
            box-shadow:
                0 30px 60px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .top-bar {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
            position: relative;
            z-index: 100;
        }

        .title-text {
            position: absolute;
            left: 0;
            top: 0;
            font-size: 14px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }

        #search-bar {
            width: 200px;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            outline: none;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 13px;
            transition: all 0.3s;
        }

        #search-bar:focus {
            width: 250px;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .search-results {
            position: absolute;
            top: 100%;
            right: 0;
            width: 300px;
            background: rgba(20, 20, 25, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            list-style: none;
            padding: 0;
            margin: 10px 0;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .search-results li {
            padding: 10px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
        }

        .search-results li:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .search-results img {
            width: 40px;
            height: 40px;
            border-radius: 4px;
        }

        .content-area {
            display: flex;
            width: 100%;
            flex-grow: 1;
            align-items: stretch;
            margin-bottom: 25px;
            gap: 40px;
            overflow: hidden;
        }

        .left-side {
            width: 200px;
            display: flex;
            flex-direction: column;
            text-align: center;
            flex-shrink: 0;
        }

        .album-art {
            width: 200px;
            height: 200px;
            border-radius: 8px;
            object-fit: cover;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        #track-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #artist-name {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .right-side {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .lyrics-box {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            scroll-behavior: smooth;
            padding-right: 15px;
            mask-image: linear-gradient(to bottom,
                    transparent,
                    black 15%,
                    black 85%,
                    transparent);
            -webkit-mask-image: linear-gradient(to bottom,
                    transparent,
                    black 15%,
                    black 85%,
                    transparent);
        }

        .lyrics-box::-webkit-scrollbar {
            width: 4px;
        }

        .lyrics-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        .lyric-line {
            color: rgba(255, 255, 255, 0.4);
            font-size: 18px;
            font-weight: 400;
            padding: 8px 0;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .lyric-line:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        .lyric-line.active {
            color: #1db954;
            font-weight: 600;
            transform: scale(1.02);
            transform-origin: left center;
            text-shadow: 0 0 20px rgba(29, 185, 84, 0.4);
        }

        .lyric-line.passed {
            color: rgba(255, 255, 255, 0.7);
        }

        .bottom-controls {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 15px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .controls button {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
            padding: 5px;
        }

        .controls button:hover {
            color: white;
        }

        .seek-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
        }

        .scroller-track {
            height: 4px;
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            position: relative;
            cursor: pointer;
            transition: height 0.2s;
        }

        .scroller-track:hover {
            height: 6px;
        }

        .scroller-filled {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: #1db954;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(29, 185, 84, 0.5);
        }

        .scroller-filled::after {
            content: "";
            position: absolute;
            right: -5px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .scroller-track:hover .scroller-filled::after {
            opacity: 1;
        }

        .time-text {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            font-variant-numeric: tabular-nums;
        }

        #status {
            position: absolute;
            bottom: 15px;
            right: 40px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }

        #login-section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 12, 27, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .login-btn {
            background: #1db954;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition:
                transform 0.2s,
                background 0.2s;
        }

        .login-btn:hover {
            transform: scale(1.05);
            background: #1ed760;
        }
    </style>
</head>

<div class="bg-blur-layer" id="bg-layer"></div>
<div class="glass-panel">
    <div id="login-section">
        <h1>Music Station 🎵</h1>
        <button class="login-btn" onclick="login()">Connect Spotify</button>
    </div>
    <div class="top-bar">
        <div class="title-text">Gana Bjana</div>
        <input type="text" id="search-bar" placeholder="Search..." onkeyup="handleSearch(event)" />
        <ul id="search-results" class="search-results"></ul>
    </div>
    <div class="content-area">
        <div class="left-side">
            <img id="album-art" class="album-art" src="https://placehold.co/400x400/1db954/white?text=Spotify" />
            <div id="track-name">Song Name</div>
            <div id="artist-name">Artist</div>
        </div>
        <div class="right-side">
            <div class="lyrics-box" id="lyrics-display">
                <div class="lyric-line active" style="text-align: center; margin-top: auto; margin-bottom: auto">
                    Ready to play...
                </div>
            </div>
        </div>
    </div>
    <div class="bottom-controls">
        <div class="controls">
            <button title="Shuffle">🔀</button>
            <button title="Repeat">🔁</button>
        </div>
        <div class="seek-bar">
            <span id="curr-time" class="time-text">0:00</span>
            <div class="scroller-track" onclick="seek(event)">
                <div class="scroller-filled" id="prog-fill"></div>
            </div>
            <span id="total-time" class="time-text">0:00</span>
        </div>
        <div class="controls">
            <button onclick="playPrevious()">⏮</button>
            <button onclick="player && player.togglePlay()" id="play-pause-btn" style="color: white; font-size: 20px">
                ▶
            </button>
            <button onclick="playNext()">⏭</button>
        </div>
    </div>
    <div id="status">Idle</div>
</div>

<script src="https://sdk.scdn.co/spotify-player.js"></script>
<script>
    const CLIENT_ID = "40c9a8494def40e7bc745523537cae08";
    const REDIRECT_URI = window.location.origin + window.location.pathname;
    let accessToken = null,
        player = null,
        deviceId = null,
        currentTrackId = null,
        currentArtist = null,
        isPlaying = false;
    let spotifyReady = false;
    let isAutoplaying = false;
    let playbackInterval = null;

    const SB = ["https://", "accounts.", "spotify.", "com"].join("");
    const AB = ["https://", "api.", "spotify.", "com/v1"].join("");

    async function login() {
        const v = [...Array(128)]
            .map(() => ((Math.random() * 36) | 0).toString(36))
            .join("");
        localStorage.setItem("cv", v);
        const d = new TextEncoder().encode(v),
            dg = await window.crypto.subtle.digest("SHA-256", d);
        const c = btoa(String.fromCharCode(...new Uint8Array(dg)))
            .replace(/\+/g, "-")
            .replace(/\//g, "_")
            .replace(/=+$/, "");
        window.location.href = `${SB}/authorize?response_type=code&client_id=${CLIENT_ID}&scope=streaming%20user-read-email%20user-modify-playback-state&code_challenge_method=S256&code_challenge=${c}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;
    }

    window.onload = async () => {
        const code = new URLSearchParams(window.location.search).get("code");
        if (code) {
            document.getElementById("login-section").style.display = "none";
            const res = await fetch(`${SB}/api/token`, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: `grant_type=authorization_code&code=${code}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&client_id=${CLIENT_ID}&code_verifier=${localStorage.getItem("cv")}`,
            });
            const data = await res.json();
            accessToken = data.access_token;
            window.history.replaceState({}, "", window.location.pathname);
            if (spotifyReady) initPlayer();
        }
    };

    window.onSpotifyWebPlaybackSDKReady = () => {
        spotifyReady = true;
        if (accessToken) initPlayer();
    };

    function initPlayer() {
        if (player) return;
        player = new Spotify.Player({
            name: "Landscape Player",
            getOAuthToken: (cb) => cb(accessToken),
            volume: 0.5,
        });
        player.addListener("ready", ({ device_id }) => {
            deviceId = device_id;
            document.getElementById("status").innerText = "Online";
            startPlaybackMonitor();
        });
        player.addListener("not_ready", ({ device_id }) => {
            document.getElementById("status").innerText = "Offline";
        });
        player.addListener("initialization_error", ({ message }) => {
            document.getElementById("status").innerText =
                "Init Error: " + message;
        });
        player.addListener("authentication_error", ({ message }) => {
            document.getElementById("status").innerText =
                "Auth Error: " + message;
        });
        player.addListener("account_error", ({ message }) => {
            document.getElementById("status").innerText =
                "Account Error: " + message;
        });
        player.addListener("player_state_changed", (state) => {
            if (!state) return;
            document.getElementById("play-pause-btn").innerText = state.paused
                ? "▶"
                : "⏸";
            const t = state.track_window.current_track;
            if (currentTrackId !== t.id) {
                currentTrackId = t.id;
                currentArtist = t.artists[0].name;
                document.getElementById("track-name").innerText = t.name;
                document.getElementById("artist-name").innerText = currentArtist;
                document.getElementById("album-art").src = t.album.images[0].url;
                document.getElementById("bg-layer").style.backgroundImage = `url('${t.album.images[0].url}')`;
                updateLyrics(t.name, currentArtist, t.id);
            }
        });
        player.connect();
    }

    async function handleSearch(e) {
        const q = e.target.value.trim();
        if (!q) return;
        const res = await fetch(
            `${AB}/search?q=${encodeURIComponent(q)}&type=track&limit=5`,
            { headers: { Authorization: `Bearer ${accessToken}` } },
        );
        const data = await res.json();
        const resDiv = document.getElementById("search-results");
        resDiv.innerHTML = "";
        if (data.tracks) {
            data.tracks.items.forEach((t) => {
                const li = document.createElement("li");
                li.innerHTML = `<img src="${t.album.images[0].url}"><div><b>${t.name}</b><br><small>${t.artists[0].name}</small></div>`;
                li.onclick = () => {
                    play(t.uri);
                    resDiv.style.display = "none";
                    e.target.value = "";
                };
                resDiv.appendChild(li);
            });
            resDiv.style.display = "block";
        }
    }

    async function play(uri) {
        if (!deviceId) {
            document.getElementById("status").innerText =
                "Player not ready. (Requires Spotify Premium)";
            return;
        }
        await fetch(`${AB}/me/player/play?device_id=${deviceId}`, {
            method: "PUT",
            body: JSON.stringify({ uris: [uri] }),
            headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${accessToken}`,
            },
        });
        document.getElementById("status").innerText = "Autoplay Ready";
    }

    async function findNextTrack() {
        if (currentTrackId) {
            try {
                const q = new URLSearchParams({
                    seed_tracks: currentTrackId,
                    limit: 5,
                });
                const res = await fetch(`${AB}/recommendations?${q}`, {
                    headers: { Authorization: `Bearer ${accessToken}` },
                });
                if (res.ok) {
                    const data = await res.json();
                    if (data.tracks && data.tracks.length > 0)
                        return data.tracks[
                            Math.floor(Math.random() * data.tracks.length)
                        ].uri;
                }
            } catch (e) {
                console.log(e);
            }
        }
        if (currentArtist) {
            try {
                const params = new URLSearchParams({
                    q: currentArtist.split("(")[0].split("-")[0].split(",")[0].trim(),
                    type: "track",
                    limit: 10,
                });
                const res = await fetch(`${AB}/search?${params}`, {
                    headers: { Authorization: `Bearer ${accessToken}` },
                });
                if (res.ok) {
                    const data = await res.json();
                    if (data.tracks && data.tracks.items.length > 0) {
                        const candidates = data.tracks.items.filter(
                            (t) => t.id !== currentTrackId,
                        );
                        if (candidates.length > 0)
                            return candidates[
                                Math.floor(Math.random() * candidates.length)
                            ].uri;
                    }
                } else {
                    console.error("Search failed with status:", res.status);
                }
            } catch (e) {
                console.log(e);
            }
        }
        return null;
    }

    async function triggerAutoplay() {
        if (isAutoplaying) return;
        isAutoplaying = true;
        document.getElementById("status").innerText = "Finding next track...";
        try {
            const nextUri = await findNextTrack();
            if (nextUri) {
                await play(nextUri);
                document.getElementById("status").innerText = "Autoplay Ready";
            } else {
                document.getElementById("status").innerText = "No tracks found";
            }
        } catch (e) {
            console.log("Autoplay error:", e);
            document.getElementById("status").innerText = "Autoplay error";
        }
        setTimeout(() => {
            isAutoplaying = false;
        }, 5000);
    }

    async function playNext() {
        if (!player) return;
        isAutoplaying = false; // Force reset the lock so skip always works
        const state = await player.getCurrentState();
        if (state && state.track_window.next_tracks.length > 0) {
            player.nextTrack();
        } else {
            await triggerAutoplay();
        }
    }

    async function playPrevious() {
        if (!player) return;
        const state = await player.getCurrentState();
        if (state && state.position > 3000) {
            player.seek(0);
        } else {
            player.previousTrack();
        }
    }

    async function updateLyrics(tn, an, id) {
        window.currentLyrics = null;
        const container = document.getElementById("lyrics-display");
        container.innerHTML =
            '<div class="lyric-line passed" style="text-align:center; margin:auto">Loading vibes...</div>';
        try {
            const res = await fetch(
                `https://lrclib.net/api/get?track_name=${encodeURIComponent(tn.split("(")[0])}&artist_name=${encodeURIComponent(an.split("(")[0])}`,
            );
            const data = await res.json();
            if (data.syncedLyrics) {
                const lines = data.syncedLyrics
                    .split("\n")
                    .map((l) => {
                        const m = l.match(/\[(\d{2}):(\d{2}\.\d{2,3})\](.*)/);
                        return m
                            ? {
                                time: parseInt(m[1]) * 60 + parseFloat(m[2]),
                                text: m[3].trim(),
                            }
                            : null;
                    })
                    .filter((l) => l && l.text);
                startSync(lines);
            } else {
                container.innerHTML =
                    '<div class="lyric-line passed" style="text-align:center; margin:auto">🎵 No synchronized lyrics available 🎵</div>';
            }
        } catch (e) {
            container.innerHTML =
                '<div class="lyric-line passed" style="text-align:center; margin:auto">Enjoy the music!</div>';
        }
    }

    function startSync(lines) {
        const container = document.getElementById("lyrics-display");
        container.innerHTML = '<div style="height: 40%"></div>';
        lines.forEach((l, i) => {
            const d = document.createElement("div");
            d.id = `l-${i}`;
            d.className = "lyric-line";
            d.innerText = l.text;
            container.appendChild(d);
        });
        container.innerHTML += '<div style="height: 40%"></div>';
        window.currentLyrics = lines;
    }

    function startPlaybackMonitor() {
        if (playbackInterval) clearInterval(playbackInterval);
        playbackInterval = setInterval(async () => {
            if (!player) return;
            const state = await player.getCurrentState();
            if (!state) return;
            const pos = state.position,
                sec = pos / 1000;
            document.getElementById("curr-time").innerText = fmt(pos);
            document.getElementById("total-time").innerText = fmt(state.duration);
            document.getElementById("prog-fill").style.width =
                `${(pos / state.duration) * 100}%`;

            if (window.currentLyrics) {
                let active = -1;
                window.currentLyrics.forEach((l, i) => {
                    if (sec >= l.time) active = i;
                });
                document.querySelectorAll(".lyric-line").forEach((el, i) => {
                    el.classList.remove("active", "passed");
                    // Offset by 1 because of the spacer div
                    if (i - 1 < active) el.classList.add("passed");
                });
                if (active !== -1 && document.getElementById(`l-${active}`)) {
                    const activeEl = document.getElementById(`l-${active}`);
                    activeEl.classList.remove("passed");
                    activeEl.classList.add("active");
                    // Auto-scroll the lyrics box
                    const container = document.getElementById("lyrics-display");
                    container.scrollTo({
                        top: activeEl.offsetTop - container.offsetHeight / 2,
                        behavior: "smooth",
                    });
                }
            }

            if (
                pos > 0 &&
                state.duration > 0 &&
                state.duration - pos < 2000 &&
                !state.paused
            ) {
                if (!isAutoplaying && state.track_window.next_tracks.length === 0) {
                    triggerAutoplay();
                }
            }
        }, 300);
    }

    function fmt(ms) {
        const s = (ms / 1000) | 0;
        return `${(s / 60) | 0}:${(s % 60).toString().padStart(2, "0")}`;
    }
    function seek(e) {
        const tgt = e.currentTarget,
            cx = e.clientX,
            rect = tgt.getBoundingClientRect(),
            w = tgt.offsetWidth;
        player.getCurrentState().then((s) => {
            if (s) player.seek(((cx - rect.left) / w) * s.duration);
        });
    }
</script>
</body>

</html>
