<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gana Bjana — Premium Player</title>

    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-primary: #ff9933;
            --accent-secondary: #00f2ea;
            --bg-base: #121212;
            --bg-mesh-1: rgba(255, 153, 51, 0.08);
            --bg-mesh-2: rgba(0, 242, 234, 0.06);
            --bg-card: rgba(20, 20, 20, 0.6);
            --bg-card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f0f0f5;
            --text-secondary: rgba(255, 255, 255, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-base);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
            overflow: hidden;
        }

        /* ======= MESH GRADIENT BACKDROP ======= */
        .bg-blur-layer {
            position: fixed;
            top: -15%; left: -15%;
            width: 130%; height: 130%;
            background-size: cover;
            background-position: center;
            filter: blur(70px) saturate(1.8) brightness(0.25);
            z-index: 0;
            transition: background-image 2s ease;
        }

        .mesh-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                radial-gradient(ellipse at 20% 30%, var(--bg-mesh-1), transparent 55%),
                radial-gradient(ellipse at 80% 70%, var(--bg-mesh-2), transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(18, 18, 18, 0.5) 0%, rgba(18, 18, 18, 0.95) 100%);
            z-index: 1;
            transition: background 1.5s ease;
            pointer-events: none;
        }

        .main-container {
            display: flex;
            width: 93vw;
            max-width: 1460px;
            max-height: 88vh;
            margin-top: 70px;
            gap: 20px;
            justify-content: center;
            align-items: stretch;
            z-index: 2;
        }

        /* ======= GLASS PANELS ======= */
        .glass-panel {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 14px;
            border: 1px solid var(--bg-card-border);
            padding: 32px 36px;
            flex-grow: 1;
            height: 520px;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* ======= BRANDING ======= */
        .header-left {
            position: absolute;
            top: 22px; left: 50px;
            display: flex;
            align-items: center;
            gap: 14px;
            z-index: 100;
        }

        h3.main-title {
            margin: 0;
            font-size: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .library-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 5px 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--text-secondary);
            font-size: 12px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.25s;
        }

        .library-btn:hover {
            color: var(--accent-secondary);
            border-color: var(--accent-secondary);
            background: rgba(0, 242, 234, 0.06);
        }

        .library-btn svg {
            width: 14px; height: 14px;
            fill: currentColor;
        }

        /* ======= SEARCH (CENTERED) ======= */
        .fixed-search {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
        }

        #search-bar {
            width: 400px;
            padding: 10px 20px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            outline: none;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-primary);
            font-size: 13px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            text-align: center;
        }

        #search-bar::placeholder { color: var(--text-secondary); }

        #search-bar:focus {
            width: 440px;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .search-results {
            width: 400px;
            margin-top: 8px;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(25px);
            border-radius: 12px;
            list-style: none;
            padding: 4px 0;
            max-height: 260px;
            overflow-y: auto;
            display: none;
            border: 1px solid var(--bg-card-border);
            z-index: 1000;
        }

        .search-results li {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            transition: background 0.2s;
        }

        .search-results li:hover { background: rgba(255, 255, 255, 0.06); }
        .search-results img { width: 38px; height: 38px; border-radius: 5px; }

        /* ======= CONTENT AREA ======= */
        .content-area {
            display: flex;
            width: 100%;
            flex-grow: 1;
            align-items: stretch;
            margin-bottom: 16px;
            gap: 28px;
            overflow: hidden;
        }

        /* ======= ALBUM SIDE ======= */
        .left-side {
            width: 240px;
            display: flex;
            flex-direction: column;
            text-align: center;
            flex-shrink: 0;
            justify-content: center;
            align-items: center;
        }

        .album-art-wrapper {
            position: relative;
            width: 220px; height: 220px;
            margin-bottom: 20px;
        }

        .album-art {
            width: 220px; height: 220px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 2;
            transition: transform 0.4s ease;
        }

        .album-art:hover { transform: scale(1.03); }

        .album-glow {
            position: absolute;
            bottom: -10px;
            left: 12%; width: 76%; height: 45px;
            border-radius: 50%;
            background: radial-gradient(ellipse, var(--accent-primary) 0%, transparent 70%);
            filter: blur(18px);
            opacity: 0.4;
            z-index: 1;
            transition: background 0.8s ease;
        }

        #track-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 230px;
            color: var(--text-primary);
        }

        #artist-name {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 230px;
            font-weight: 300;
        }

        .artist-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .artist-link {
            display: flex;
            align-items: center;
            cursor: pointer;
            position: relative;
            color: var(--text-secondary);
            transition: color 0.2s;
        }

        .artist-link:hover {
            color: var(--accent-secondary);
        }

        .artist-link svg {
            width: 12px; height: 12px;
            fill: currentColor;
        }

        .artist-link .tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.95);
            color: var(--text-primary);
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            margin-bottom: 4px;
        }

        .artist-link:hover .tooltip {
            opacity: 1;
        }

        /* ======= LYRICS (CLEAN, FLOATING) ======= */
        .center-side {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        #wave-canvas {
            position: absolute;
            bottom: -8px; left: 0;
            width: 100%; height: 80px;
            z-index: 0;
            opacity: 0.25;
            pointer-events: none;
        }

        .lyrics-box {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            scroll-behavior: smooth;
            padding-right: 12px;
            position: relative;
            z-index: 1;
            mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 88%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 88%, transparent 100%);
        }

        .lyrics-box::-webkit-scrollbar { width: 2px; }
        .lyrics-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        .lyric-line {
            color: rgba(255, 255, 255, 0.3);
            font-size: 18px;
            font-weight: 400;
            padding: 9px 0;
            line-height: 1.75;
            transition: color 0.3s ease, font-weight 0.3s ease;
            cursor: pointer;
            font-family: 'Noto Sans Devanagari', 'Poppins', sans-serif;
        }

        .lyric-line:hover {
            color: rgba(255, 255, 255, 0.55);
        }

        .lyric-line.active {
            color: var(--accent-primary);
            font-weight: 600;
        }

        .lyric-line.passed {
            color: rgba(255, 255, 255, 0.55);
        }

        /* ======= CONTROLS ======= */
        .bottom-controls {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 10px;
            position: relative;
            z-index: 2;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .controls button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 5px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .controls button:hover {
            color: var(--accent-secondary);
        }

        .controls button svg {
            width: 18px; height: 18px;
            fill: currentColor;
        }

        .controls button.play-btn svg {
            width: 24px; height: 24px;
        }

        .controls button.play-btn {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.06);
            border-radius: 50%;
            width: 40px; height: 40px;
            transition: background 0.2s, color 0.2s;
        }

        .controls button.play-btn:hover {
            background: var(--accent-secondary);
            color: var(--bg-base);
        }

        /* ======= PROGRESS BAR (CLEAN, NO GLOW) ======= */
        .seek-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-grow: 1;
        }

        .scroller-track {
            height: 3px;
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            position: relative;
            cursor: pointer;
            transition: height 0.15s;
        }

        .scroller-track:hover { height: 5px; }

        .scroller-filled {
            position: absolute;
            left: 0; top: 0;
            height: 100%; width: 0%;
            background: var(--accent-primary);
            border-radius: 3px;
        }

        .scroller-filled::after {
            content: "";
            position: absolute;
            right: -5px; top: 50%;
            transform: translateY(-50%);
            width: 10px; height: 10px;
            background: var(--accent-primary);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .scroller-track:hover .scroller-filled::after {
            opacity: 1;
        }

        .time-text {
            font-size: 11px;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
            font-family: 'Poppins', monospace;
            min-width: 30px;
        }

        /* ======= STATUS ======= */
        #status {
            position: absolute;
            bottom: 10px; right: 32px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.5px;
        }

        /* ======= QUEUE SIDEBAR ======= */
        .queue-sidebar {
            width: 300px;
            height: 520px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 14px;
            border: 1px solid var(--bg-card-border);
            padding: 20px;
        }

        .section-separator {
            width: 1px;
            align-self: stretch;
            background: rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .queue-header {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 10px;
        }

        .queue-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-right: 3px;
        }

        .queue-list::-webkit-scrollbar { width: 2px; }
        .queue-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        .queue-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 8px;
            border-radius: 8px;
            transition: background 0.2s;
            background: transparent;
            text-align: left;
            cursor: pointer;
        }

        .queue-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .queue-item img {
            width: 38px; height: 38px;
            border-radius: 5px;
            flex-shrink: 0;
        }

        .queue-item-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-grow: 1;
            gap: 1px;
        }

        .queue-item-title {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }

        .queue-item-artist {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.4);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 300;
        }

        /* ======= SIDEBAR QUICK-ACTIONS ======= */
        .queue-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .queue-item:hover .queue-actions {
            opacity: 1;
        }

        .queue-actions svg {
            width: 15px; height: 15px;
            cursor: pointer;
            transition: transform 0.15s;
        }

        .queue-actions svg:hover {
            transform: scale(1.15);
        }

        .queue-actions .heart-icon { fill: var(--accent-primary); }
        .queue-actions .plus-icon { fill: var(--accent-secondary); }

        /* ======= LOGIN ======= */
        #login-section {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(18, 18, 18, 0.96);
            backdrop-filter: blur(25px);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        #login-section h1 {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 30px;
            letter-spacing: 3px;
            background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 18px;
        }

        .login-btn {
            background: var(--accent-secondary);
            color: var(--bg-base);
            border: none;
            padding: 12px 34px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .login-btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        /* ======= RESPONSIVE ======= */
        @media (max-width: 1200px) {
            .main-container { flex-direction: column; max-height: none; margin-top: 80px; }
            .glass-panel { height: auto; min-height: 420px; }
            .queue-sidebar { width: 100%; height: 280px; }
            .left-side { width: 180px; }
            .album-art-wrapper, .album-art { width: 160px; height: 160px; }
        }

        @media (max-width: 768px) {
            h3.main-title { font-size: 16px; left: 20px; }
            .fixed-search { right: 20px; }
            #search-bar { width: 150px; }
            .content-area { flex-direction: column; gap: 16px; }
            .left-side { width: 100%; flex-direction: row; gap: 16px; }
            .album-art-wrapper, .album-art { width: 100px; height: 100px; }
            .glass-panel { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="bg-blur-layer" id="bg-layer"></div>
<div class="mesh-overlay" id="mesh-overlay"></div>

<div class="header-left">
    <h3 class="main-title">Gana Bjana</h3>
    <button class="library-btn" title="Library">
        <svg viewBox="0 0 24 24"><path d="M20 6H12l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
        Library
    </button>
</div>
<div class="fixed-search">
    <input type="text" id="search-bar" placeholder="Search Songs..." onkeyup="handleSearch(event)" />
    <ul id="search-results" class="search-results"></ul>
</div>

<div class="main-container">
<div class="glass-panel">
    <div id="login-section">
        <h1>Gana Bjana</h1>
        <button class="login-btn" onclick="login()">Connect Spotify</button>
    </div>
    <div class="content-area">
        <div class="left-side">
            <div class="album-art-wrapper">
                <img id="album-art" class="album-art" crossorigin="anonymous" src="https://placehold.co/400x400/141222/00f2ea?text=%E2%99%AB" />
                <div class="album-glow" id="album-glow"></div>
            </div>
            <div id="track-name">Song Name</div>
            <div class="artist-row">
                <div id="artist-name">Artist</div>
                <span class="artist-link" id="artist-link" onclick="openArtistProfile()">
                    <svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
                    <span class="tooltip">View Artist Profile</span>
                </span>
            </div>
        </div>
        <div class="center-side">
            <canvas id="wave-canvas"></canvas>
            <div class="lyrics-box" id="lyrics-display">
                <div class="lyric-line active" style="text-align: center; margin-top: auto; margin-bottom: auto">
                    Ready to play...
                </div>
            </div>
        </div>
    </div>
    <div class="bottom-controls">
        <div class="controls">
            <!-- Shuffle SVG -->
            <button title="Shuffle" id="shuffle-btn">
                <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
            </button>
            <!-- Repeat SVG -->
            <button title="Repeat" id="repeat-btn">
                <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
            </button>
        </div>
        <div class="seek-bar">
            <span id="curr-time" class="time-text">0:00</span>
            <div class="scroller-track" onclick="seek(event)">
                <div class="scroller-filled" id="prog-fill"></div>
            </div>
            <span id="total-time" class="time-text">0:00</span>
        </div>
        <div class="controls">
            <!-- Previous SVG -->
            <button onclick="playPrevious()" title="Previous">
                <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <!-- Play/Pause SVG -->
            <button onclick="player && player.togglePlay()" id="play-pause-btn" class="play-btn" title="Play/Pause">
                <svg viewBox="0 0 24 24" id="play-icon"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <!-- Next SVG -->
            <button onclick="playNext()" title="Next">
                <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
        </div>
    </div>
    <div id="status">Idle</div>
</div>
<div class="section-separator"></div>
<div class="queue-sidebar">
    <div class="queue-header">Up Next</div>
    <div class="queue-list" id="queue-list">
        <div style="font-size: 13px; color: rgba(255,255,255,0.3); text-align: center; margin-top: 50px;">Queue is empty.</div>
    </div>
</div>
</div>

<script src="https://sdk.scdn.co/spotify-player.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
<script>
    // ========== WAVE VISUALIZER ==========
    (function initWaveVisualizer() {
        const canvas = document.getElementById('wave-canvas');
        const ctx = canvas.getContext('2d');
        let animFrame;
        let phase = 0;

        function resize() {
            canvas.width = canvas.offsetWidth * window.devicePixelRatio;
            canvas.height = canvas.offsetHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        resize();
        window.addEventListener('resize', resize);

        function drawWave() {
            const w = canvas.offsetWidth;
            const h = canvas.offsetHeight;
            ctx.clearRect(0, 0, w, h);

            const gradient = ctx.createLinearGradient(0, 0, w, 0);
            gradient.addColorStop(0, 'rgba(0, 242, 234, 0.35)');
            gradient.addColorStop(0.5, 'rgba(0, 200, 200, 0.2)');
            gradient.addColorStop(1, 'rgba(255, 153, 51, 0.35)');

            for (let wave = 0; wave < 3; wave++) {
                ctx.beginPath();
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 1.0 - wave * 0.2;
                ctx.globalAlpha = 0.5 - wave * 0.12;

                for (let x = 0; x <= w; x += 2) {
                    const freq = 0.008 + wave * 0.003;
                    const amp = 10 + wave * 5;
                    const y = h / 2 + Math.sin(x * freq + phase + wave * 1.2) * amp
                            + Math.sin(x * freq * 2.3 + phase * 1.5) * (amp * 0.3);
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
            ctx.globalAlpha = 1;
            phase += 0.015;
            animFrame = requestAnimationFrame(drawWave);
        }
        drawWave();
    })();

    // ========== CORE PLAYER LOGIC (UNTOUCHED) ==========
    const CLIENT_ID = "40c9a8494def40e7bc745523537cae08";
    const REDIRECT_URI = window.location.origin + window.location.pathname;
    let accessToken = null,
        player = null,
        deviceId = null,
        currentTrackId = null,
        currentArtist = null,
        currentArtistUri = null,
        isPlaying = false;
    let spotifyReady = false;
    let isAutoplaying = false;
    let playbackInterval = null;
    let playedTracks = new Set();

    const SB = ["https://", "accounts.", "spotify.", "com"].join("");
    const AB = ["https://", "api.", "spotify.", "com/v1"].join("");

    async function login() {
        const v = [...Array(128)]
            .map(() => ((Math.random() * 36) | 0).toString(36))
            .join("");
        localStorage.setItem("cv", v);
        const d = new TextEncoder().encode(v),
            dg = await window.crypto.subtle.digest("SHA-256", d);
        const c = btoa(String.fromCharCode(...new Uint8Array(dg)))
            .replace(/\+/g, "-")
            .replace(/\//g, "_")
            .replace(/=+$/, "");
        window.location.href = `${SB}/authorize?response_type=code&client_id=${CLIENT_ID}&scope=streaming%20user-read-email%20user-modify-playback-state%20user-read-currently-playing%20user-read-playback-state&code_challenge_method=S256&code_challenge=${c}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;
    }

    window.onload = async () => {
        const code = new URLSearchParams(window.location.search).get("code");
        if (code) {
            document.getElementById("login-section").style.display = "none";
            const res = await fetch(`${SB}/api/token`, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: `grant_type=authorization_code&code=${code}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&client_id=${CLIENT_ID}&code_verifier=${localStorage.getItem("cv")}`,
            });
            const data = await res.json();
            accessToken = data.access_token;
            window.history.replaceState({}, "", window.location.pathname);
            if (spotifyReady) initPlayer();
        }
    };

    window.onSpotifyWebPlaybackSDKReady = () => {
        spotifyReady = true;
        if (accessToken) initPlayer();
    };

    function initPlayer() {
        if (player) return;
        player = new Spotify.Player({
            name: "Landscape Player",
            getOAuthToken: (cb) => cb(accessToken),
            volume: 0.5,
        });
        player.addListener("ready", ({ device_id }) => {
            deviceId = device_id;
            document.getElementById("status").innerText = "Online";
            startPlaybackMonitor();
        });
        player.addListener("not_ready", ({ device_id }) => {
            document.getElementById("status").innerText = "Offline";
        });
        player.addListener("initialization_error", ({ message }) => {
            document.getElementById("status").innerText = "Init Error: " + message;
        });
        player.addListener("authentication_error", ({ message }) => {
            document.getElementById("status").innerText = "Auth Error: " + message;
        });
        player.addListener("account_error", ({ message }) => {
            document.getElementById("status").innerText = "Account Error: " + message;
        });
        let previousState = null;
        player.addListener("player_state_changed", (state) => {
            if (!state) return;

            // Update Play/Pause SVG
            const playIcon = document.getElementById("play-icon");
            if (state.paused) {
                playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
            } else {
                playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            }

            if (previousState && !previousState.paused && state.paused && state.position === 0) {
                if (state.track_window.next_tracks.length === 0 && !isAutoplaying) {
                    triggerAutoplay();
                }
            }
            previousState = state;

            const t = state.track_window.current_track;
            if (currentTrackId !== t.id) {
                currentTrackId = t.id;
                playedTracks.add(t.id);
                if (playedTracks.size > 200) playedTracks.clear(); // prevent memory bloat
                currentArtist = t.artists[0].name;
                currentArtistUri = t.artists[0].uri || null;
                document.getElementById("track-name").innerText = t.name;
                document.getElementById("artist-name").innerText = currentArtist;

                const imgEl = document.getElementById("album-art");
                imgEl.crossOrigin = "anonymous";
                imgEl.src = t.album.images[0].url;

                // Extract dominant + secondary color for album glow & mesh backdrop
                imgEl.onload = function() {
                    try {
                        if (typeof ColorThief !== 'undefined') {
                            const ct = new ColorThief();
                            const [r, g, b] = ct.getColor(imgEl);
                            document.getElementById("album-glow").style.background =
                                `radial-gradient(ellipse, rgba(${r},${g},${b},0.6) 0%, transparent 70%)`;
                            // Update mesh gradient backdrop with album colors
                            const palette = ct.getPalette(imgEl, 3);
                            if (palette && palette.length >= 2) {
                                const [r1,g1,b1] = palette[0];
                                const [r2,g2,b2] = palette[1];
                                document.getElementById('mesh-overlay').style.background = `
                                    radial-gradient(ellipse at 20% 30%, rgba(${r1},${g1},${b1},0.12), transparent 55%),
                                    radial-gradient(ellipse at 80% 70%, rgba(${r2},${g2},${b2},0.10), transparent 55%),
                                    radial-gradient(ellipse at 50% 50%, rgba(18,18,18,0.5) 0%, rgba(18,18,18,0.95) 100%)
                                `;
                            }
                        }
                    } catch(e) { console.log("ColorThief:", e); }
                };

                document.getElementById("bg-layer").style.backgroundImage = `url('${t.album.images[0].url}')`;
                updateLyrics(t.name, currentArtist, t.id);

                refreshQueue();
                setTimeout(refreshQueue, 1500);
            }
        });
        player.connect();
    }

    // ========== QUEUE MANAGEMENT ==========
    let lastGanaBjanaLoad = 0;
    function refreshQueue() {
        if (!accessToken) return;
        fetch(`${AB}/me/player/queue`, {
            headers: { Authorization: `Bearer ${accessToken}` }
        })
        .then(res => res.json())
        .then(data => {
            const queueBox = document.getElementById("queue-list");
            let actualQueue = [];

            if (data && data.queue && data.queue.length > 0) {
                const seenIds = new Set();
                for (const track of data.queue) {
                    if (track.id && track.id !== currentTrackId && !seenIds.has(track.id)) {
                        seenIds.add(track.id);
                        actualQueue.push(track);
                    }
                }
            }

            if (actualQueue.length > 0) {
                window.ganaBjanaActive = false;
                window.ganaBjanaQueue = [];
                queueBox.innerHTML = "";
                const limit = Math.min(actualQueue.length, 20);
                for (let i = 0; i < limit; i++) {
                    appendTrackToUI(queueBox, actualQueue[i], true);
                }
            } else {
                window.ganaBjanaActive = true;
                if (window.ganaBjanaQueue && window.ganaBjanaQueue.length > 0) {
                    queueBox.innerHTML = "";
                    const header = document.createElement("div");
                    header.style.cssText = "font-size: 10px; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; font-weight: 600; text-align: center; font-family: 'Poppins', sans-serif;";
                    header.innerText = "Gana Bjana Recommended";
                    queueBox.appendChild(header);

                    for (let i = 0; i < window.ganaBjanaQueue.length; i++) {
                        appendTrackToUI(queueBox, window.ganaBjanaQueue[i], false);
                    }
                } else {
                    if (Date.now() - lastGanaBjanaLoad > 3000) {
                        lastGanaBjanaLoad = Date.now();
                        loadGanaBjana(queueBox);
                    }
                }
            }
        })
        .catch(err => {
            console.error("Failed to fetch queue", err);
        });
    }

    function appendTrackToUI(queueBox, track, isSpotifyQueue) {
        const el = document.createElement("div");
        el.className = "queue-item";
        let imgUrl = "https://placehold.co/40x40/141222/00f2ea?text=%E2%99%AB";
        if (track.album && track.album.images && track.album.images.length > 0) {
            imgUrl = track.album.images[track.album.images.length > 1 ? 1 : 0].url;
        }
        el.innerHTML = `<img src="${imgUrl}" crossorigin="anonymous"><div class="queue-item-info"><div class="queue-item-title">${track.name}</div><div class="queue-item-artist">${track.artists[0].name}</div></div><div class="queue-actions"><svg class="heart-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg><svg class="plus-icon" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></div>`;
        el.title = "Play this track";
        el.onclick = function() {
            if (!isSpotifyQueue) { window.ganaBjanaQueue = []; }
            play(track.uri);
        };
        queueBox.appendChild(el);
    }

    // ========== SEARCH ==========
    async function handleSearch(e) {
        const q = e.target.value.trim();
        if (!q) return;
        const res = await fetch(
            `${AB}/search?q=${encodeURIComponent(q)}&type=track&limit=5`,
            { headers: { Authorization: `Bearer ${accessToken}` } },
        );
        const data = await res.json();
        const resDiv = document.getElementById("search-results");
        resDiv.innerHTML = "";
        if (data.tracks) {
            data.tracks.items.forEach((t) => {
                const li = document.createElement("li");
                li.innerHTML = `<img src="${t.album.images[0].url}"><div><b>${t.name}</b><br><small style="color:var(--text-secondary)">${t.artists[0].name}</small></div>`;
                li.onclick = () => {
                    play(t.uri);
                    resDiv.style.display = "none";
                    e.target.value = "";
                };
                resDiv.appendChild(li);
            });
            resDiv.style.display = "block";
        }
    }

    // ========== PLAY ==========
    async function play(uri) {
        if (!deviceId) {
            document.getElementById("status").innerText = "Player not ready. (Requires Spotify Premium)";
            return;
        }
        await fetch(`${AB}/me/player/play?device_id=${deviceId}`, {
            method: "PUT",
            body: JSON.stringify({ uris: [uri] }),
            headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${accessToken}`,
            },
        });
        document.getElementById("status").innerText = "Autoplay Ready";
    }

    function openArtistProfile() {
        if (currentArtistUri) {
            const artistId = currentArtistUri.split(':').pop();
            window.open(`https://open.spotify.com/artist/${artistId}`, '_blank');
        }
    }

    // ========== RECOMMENDATIONS ==========
    async function fetchGanaBjanaRecommendations() {
        if (currentTrackId) {
            try {
                const q = new URLSearchParams({ seed_tracks: currentTrackId, limit: 10 });
                const res = await fetch(`${AB}/recommendations?${q}`, {
                    headers: { Authorization: `Bearer ${accessToken}` },
                });
                if (res.ok) {
                    const data = await res.json();
                    if (data.tracks && data.tracks.length > 0) {
                        const filtered = data.tracks.filter(t => t.id !== currentTrackId && !playedTracks.has(t.id));
                        if (filtered.length > 0) return filtered;
                    }
                }
            } catch (e) { console.log(e); }
        }
        if (currentArtist) {
            try {
                const params = new URLSearchParams({
                    q: currentArtist.split("(")[0].split("-")[0].split(",")[0].trim(),
                    type: "track",
                    limit: 10,
                });
                const res = await fetch(`${AB}/search?${params}`, {
                    headers: { Authorization: `Bearer ${accessToken}` },
                });
                if (res.ok) {
                    const data = await res.json();
                    if (data.tracks && data.tracks.items.length > 0) {
                        const filtered = data.tracks.items.filter((t) => t.id !== currentTrackId && !playedTracks.has(t.id));
                        if (filtered.length > 0) return filtered;
                    }
                }
            } catch (e) { console.log(e); }
        }
        return [];
    }

    function loadGanaBjana(queueBox) {
        fetchGanaBjanaRecommendations().then(recs => {
            if (recs && recs.length > 0) {
                window.ganaBjanaQueue = recs;
                window.ganaBjanaActive = true;
                queueBox.innerHTML = "";
                const header = document.createElement("div");
                header.style.cssText = "font-size: 10px; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; font-weight: 600; text-align: center; font-family: 'Poppins', sans-serif;";
                header.innerText = "Gana Bjana Recommended";
                queueBox.appendChild(header);
                for (let i = 0; i < recs.length; i++) {
                    appendTrackToUI(queueBox, recs[i], false);
                }
            } else {
                queueBox.innerHTML = '<div style="font-size: 13px; color: rgba(255,255,255,0.3); text-align: center; margin-top: 50px;">Gana Bjana found no tracks.</div>';
            }
        });
    }

    // ========== AUTOPLAY ==========
    async function triggerAutoplay() {
        if (isAutoplaying) return;
        isAutoplaying = true;
        document.getElementById("status").innerText = "Finding next track...";
        try {
            let nextUri = null;
            if (window.ganaBjanaActive && window.ganaBjanaQueue && window.ganaBjanaQueue.length > 0) {
                nextUri = window.ganaBjanaQueue[0].uri;
                window.ganaBjanaQueue.shift();
            } else {
                const recs = await fetchGanaBjanaRecommendations();
                if (recs && recs.length > 0) {
                    nextUri = recs[0].uri;
                    window.ganaBjanaQueue = recs.slice(1);
                    window.ganaBjanaActive = true;
                }
            }
            if (nextUri) {
                await play(nextUri);
                document.getElementById("status").innerText = "Autoplay Ready";
            } else {
                document.getElementById("status").innerText = "No tracks found";
            }
        } catch (e) {
            console.log("Autoplay error:", e);
            document.getElementById("status").innerText = "Autoplay error";
        }
        setTimeout(() => { isAutoplaying = false; }, 5000);
    }

    async function playNext() {
        if (!player) return;
        isAutoplaying = false;
        const state = await player.getCurrentState();
        if (state && state.track_window.next_tracks.length > 0) {
            player.nextTrack();
        } else {
            await triggerAutoplay();
        }
    }

    async function playPrevious() {
        if (!player) return;
        const state = await player.getCurrentState();
        if (state && state.position > 3000) {
            player.seek(0);
        } else {
            player.previousTrack();
        }
    }

    // ========== LYRICS ==========
    async function updateLyrics(tn, an, id) {
        window.currentLyrics = null;
        const container = document.getElementById("lyrics-display");
        container.innerHTML = '<div class="lyric-line passed" style="text-align:center; margin:auto">Loading vibes...</div>';
        try {
            const res = await fetch(
                `https://lrclib.net/api/get?track_name=${encodeURIComponent(tn.split("(")[0])}&artist_name=${encodeURIComponent(an.split("(")[0])}`,
            );
            const data = await res.json();
            if (data.syncedLyrics) {
                const lines = data.syncedLyrics
                    .split("\n")
                    .map((l) => {
                        const m = l.match(/\[(\d{2}):(\d{2}\.\d{2,3})\](.*)/);
                        return m ? { time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() } : null;
                    })
                    .filter((l) => l && l.text);
                startSync(lines);
            } else {
                container.innerHTML = '<div class="lyric-line passed" style="text-align:center; margin:auto">Sorry...You have to Guess</div>';
            }
        } catch (e) {
            container.innerHTML = '<div class="lyric-line passed" style="text-align:center; margin:auto">Enjoy the music!</div>';
        }
    }

    function startSync(lines) {
        const container = document.getElementById("lyrics-display");
        container.innerHTML = '<div style="height: 40%"></div>';
        lines.forEach((l, i) => {
            const d = document.createElement("div");
            d.id = `l-${i}`;
            d.className = "lyric-line";
            d.innerText = l.text;
            // Clickable lyrics: seek to this line's timestamp
            d.addEventListener('click', () => {
                if (player && window.currentLyrics && window.currentLyrics[i]) {
                    player.seek(window.currentLyrics[i].time * 1000);
                }
            });
            container.appendChild(d);
        });
        const bottomSpacer = document.createElement('div');
        bottomSpacer.style.height = '40%';
        container.appendChild(bottomSpacer);
        window.currentLyrics = lines;
    }

    // ========== PLAYBACK MONITOR ==========
    function startPlaybackMonitor() {
        if (playbackInterval) clearInterval(playbackInterval);
        playbackInterval = setInterval(async () => {
            if (!player) return;
            const state = await player.getCurrentState();
            if (!state) return;
            const pos = state.position, sec = pos / 1000;
            document.getElementById("curr-time").innerText = fmt(pos);
            document.getElementById("total-time").innerText = fmt(state.duration);
            document.getElementById("prog-fill").style.width = `${(pos / state.duration) * 100}%`;

            if (window.currentLyrics) {
                let active = -1;
                window.currentLyrics.forEach((l, i) => { if (sec >= l.time) active = i; });
                document.querySelectorAll(".lyric-line").forEach((el, i) => {
                    el.classList.remove("active", "passed");
                    if (i - 1 < active) el.classList.add("passed");
                });
                if (active !== -1 && document.getElementById(`l-${active}`)) {
                    const activeEl = document.getElementById(`l-${active}`);
                    activeEl.classList.remove("passed");
                    activeEl.classList.add("active");
                    const container = document.getElementById("lyrics-display");
                    container.scrollTo({
                        top: activeEl.offsetTop - container.offsetHeight / 2,
                        behavior: "smooth",
                    });
                }
            }

            if (pos > 0 && state.duration > 0 && state.duration - pos < 500 && !state.paused && state.track_window.next_tracks.length === 0 && !isAutoplaying) {
                triggerAutoplay();
            }
        }, 300);
    }

    function fmt(ms) {
        const s = (ms / 1000) | 0;
        return `${(s / 60) | 0}:${(s % 60).toString().padStart(2, "0")}`;
    }

    function seek(e) {
        const tgt = e.currentTarget, cx = e.clientX, rect = tgt.getBoundingClientRect(), w = tgt.offsetWidth;
        player.getCurrentState().then((s) => {
            if (s) player.seek(((cx - rect.left) / w) * s.duration);
        });
    }

    // ========== KEYBOARD SHORTCUTS (PRESERVED) ==========
    window.addEventListener("keydown", function(event) {
        if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') return;
        switch (event.code) {
            case "Space":
                event.preventDefault();
                if (player) player.togglePlay();
                break;
            case "ArrowRight":
                playNext();
                break;
            case "ArrowLeft":
                playPrevious();
                break;
        }
    });
</script>
